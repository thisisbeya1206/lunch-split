<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>午餐分帳 · 月結版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f5f0ea;
  --surface:   #faf7f4;
  --card:      #ffffff;
  --border:    #e8e0d5;
  --border2:   #f0e8df;
  --text-1:    #3d3530;
  --text-2:    #8c7b70;
  --text-3:    #b5a89e;
  --accent:    #c4956a;
  --accent-lt: #f0e6da;
  --accent-hv: #b07d54;
  --red:       #d98a7e;
  --red-bg:    #fdf2f0;
  --green:     #85a882;
  --green-bg:  #eff5ef;
  --blue:      #7fa0be;
  --blue-bg:   #edf3f9;
  --r-sm: 10px; --r-md: 16px; --r-lg: 22px; --r-xl: 28px;
  --sh: 0 2px 16px rgba(100,80,60,.07);
  --sh2: 0 8px 32px rgba(100,80,60,.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text-1);font-size:15px;line-height:1.6;}

/* ── TABS ── */
.app-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border);}
.app-tab{flex:1;padding:12px 0 10px;text-align:center;font-size:12px;color:var(--text-3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;letter-spacing:.04em;font-weight:500;}
.app-tab .ti{display:block;font-size:19px;margin-bottom:2px;}
.app-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── VIEWS ── */
.view{display:none;padding:14px 15px 110px;max-width:480px;margin:0 auto;}
.view.active{display:block;}

/* ── MONTH HEADER ── */
.month-header{background:var(--card);border-radius:var(--r-lg);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:14px;}
.mh-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.mh-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:500;letter-spacing:.04em;}
.month-nav{display:flex;align-items:center;gap:6px;}
.mnav-btn{width:30px;height:30px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all .2s;}
.mnav-btn:active{background:var(--accent-lt);border-color:var(--accent);}
.mnav-lbl{font-size:13px;font-weight:500;color:var(--text-1);min-width:62px;text-align:center;letter-spacing:.04em;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sg-item{text-align:center;padding:8px 0;border-radius:var(--r-sm);background:var(--bg);}
.sg-lbl{font-size:10px;color:var(--text-3);letter-spacing:.06em;margin-bottom:2px;}
.sg-val{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:500;}
.sg-val.red{color:var(--red);}
.sg-val.grn{color:var(--green);}

/* ── SEC ── */
.sec{font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between;}

/* ── FILTER PILLS ── */
.filter-pills{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.filter-pills::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;color:var(--text-2);background:var(--card);cursor:pointer;transition:all .2s;font-weight:500;letter-spacing:.03em;}
.pill.active{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}

/* ── ORDER CARDS ── */
.order-list{display:flex;flex-direction:column;gap:9px;}
.order-card{background:var(--card);border-radius:var(--r-md);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;}
.oc-head{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;}
.oc-av{width:34px;height:34px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:14px;color:var(--blue);flex-shrink:0;font-weight:500;}
.oc-info{flex:1;min-width:0;}
.oc-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oc-meta{font-size:11px;color:var(--text-3);margin-top:1px;}
.oc-right{text-align:right;flex-shrink:0;}
.oc-amt{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:500;}
.oc-status{font-size:10px;margin-top:2px;}
.oc-chev{font-size:10px;color:var(--text-3);margin-left:5px;transition:transform .2s;}
.oc-chev.open{transform:rotate(90deg);}
.oc-body{border-top:1px solid var(--border);display:none;}
.oc-body.open{display:block;}
.oc-payer-bar{display:flex;align-items:center;padding:7px 14px;background:var(--blue-bg);gap:6px;}
.oc-payer-lbl{flex:1;font-size:11px;color:var(--blue);letter-spacing:.03em;}
.oc-del{width:26px;height:26px;border:none;background:transparent;color:var(--text-3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.oc-del:active{color:var(--red);}
.oc-split-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border2);gap:8px;}
.oc-split-row:last-child{border-bottom:none;}
.oc-sname{flex:1;font-size:13px;color:var(--text-2);}
.oc-samt{font-size:13px;font-weight:500;}
.oc-stag{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:5px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.oc-stag.unpaid{background:var(--red-bg);color:var(--red);}
.oc-stag.paid{background:var(--green-bg);color:var(--green);}
.oc-stag.is-payer{background:var(--blue-bg);color:var(--blue);cursor:default;}

/* ── FORM ── */
.form-card{background:var(--card);border-radius:var(--r-xl);padding:18px;border:1px solid var(--border);box-shadow:var(--sh);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.frow.one{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:4px;}
.flbl{font-size:11px;color:var(--text-2);letter-spacing:.05em;font-weight:500;}
.finp{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--text-1);width:100%;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.finp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,149,106,.12);}
.finp::placeholder{color:var(--text-3);}

/* payer */
.payer-wrap{margin-bottom:10px;}
.payer-row{display:flex;flex-wrap:wrap;gap:6px;}
.pc{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;color:var(--text-2);cursor:pointer;transition:all .2s;user-select:none;}
.pc.sel{background:var(--blue-bg);border-color:var(--blue);color:#4a7fa0;font-weight:500;}

/* participants */
.part-area{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;}
.part-lbl{font-size:11px;color:var(--text-2);letter-spacing:.05em;font-weight:500;margin-bottom:7px;}
.part-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.chip{display:flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 10px 5px 8px;font-size:13px;color:var(--text-2);cursor:pointer;transition:all .2s;user-select:none;}
.chip.sel{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}
.chip-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s;}
.chip.sel .chip-dot{background:var(--accent);}
.new-mem-row{display:flex;gap:6px;}
.new-mem-inp{flex:1;background:var(--card);border:1.5px dashed var(--border);border-radius:var(--r-sm);padding:7px 10px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text-1);outline:none;}
.new-mem-inp:focus{border-color:var(--accent);}
.new-mem-btn{background:var(--accent-lt);color:var(--accent);border:none;border-radius:var(--r-sm);padding:0 14px;font-size:18px;cursor:pointer;transition:background .2s;}

/* split mode */
.split-row{display:flex;gap:8px;margin-bottom:10px;}
.sp-btn{flex:1;padding:9px 4px;border-radius:var(--r-sm);border:1.5px solid var(--border);font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--text-2);background:var(--bg);cursor:pointer;text-align:center;transition:all .2s;letter-spacing:.03em;}
.sp-btn.active{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}

/* custom amounts */
.ca-wrap{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;}
.ca-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border2);}
.ca-row:last-of-type{border-bottom:none;}
.ca-name{flex:1;font-size:13px;color:var(--text-2);}
.ca-inp{width:78px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:6px 8px;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--text-1);text-align:right;outline:none;}
.ca-inp:focus{border-color:var(--accent);}
.ca-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.ca-foot-lbl{font-size:12px;color:var(--text-3);}
.ca-foot-val{font-size:13px;font-weight:500;}
.ca-foot-val.ok{color:var(--green);}
.ca-foot-val.ng{color:var(--red);}

/* btn */
.btn-main{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:13px;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:.08em;transition:background .2s,transform .1s;margin-top:4px;}
.btn-main:active{transform:scale(.98);background:var(--accent-hv);}
.btn-ghost{background:var(--surface);color:var(--text-2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;letter-spacing:.05em;transition:all .2s;width:100%;}
.btn-ghost:active{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}

/* ── SETTLE VIEW ── */
.settle-hero{background:var(--card);border-radius:var(--r-lg);padding:18px;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:14px;}
.sh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.sh-month{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:500;letter-spacing:.04em;}
.sh-badge{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:500;letter-spacing:.05em;}
.sh-badge.ongoing{background:var(--accent-lt);color:var(--accent);}
.sh-badge.past{background:var(--bg);color:var(--text-3);}
.progress-wrap{margin-bottom:10px;}
.progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);margin-bottom:5px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease;}
.sh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sh-stat{text-align:center;}
.sh-stat-lbl{font-size:10px;color:var(--text-3);letter-spacing:.05em;margin-bottom:2px;}
.sh-stat-val{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:500;}

/* debt card */
.debt-section{margin-bottom:20px;}
.debt-cards{display:flex;flex-direction:column;gap:9px;}
.debt-card{background:var(--card);border-radius:var(--r-md);border:1px solid var(--border);padding:14px 15px;box-shadow:var(--sh);transition:opacity .3s;}
.debt-card.is-paid{opacity:.55;}
.dc-top{display:flex;align-items:center;gap:10px;}
.dc-from-av{width:36px;height:36px;border-radius:50%;background:var(--red-bg);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:15px;color:var(--red);flex-shrink:0;}
.dc-arrow-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.dc-arrow{font-size:13px;color:var(--text-3);}
.dc-to-av{width:36px;height:36px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:15px;color:var(--green);flex-shrink:0;}
.dc-info{flex:1;min-width:0;}
.dc-names{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dc-from-name{color:var(--text-1);}
.dc-arrow-txt{color:var(--text-3);font-size:12px;}
.dc-to-name{color:var(--text-2);}
.dc-sub{font-size:11px;color:var(--text-3);margin-top:2px;}
.dc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.dc-amount{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:500;color:var(--accent);}
.dc-paid-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .25s;font-size:12px;color:var(--text-2);font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.dc-paid-btn.paid{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.dc-check{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--border);background:var(--card);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:9px;color:transparent;}
.dc-paid-btn.paid .dc-check{background:var(--green);border-color:var(--green);color:#fff;}

/* balance card */
.balance-section{margin-bottom:20px;}
.bal-cards{display:flex;flex-direction:column;gap:8px;}
.bal-card{background:var(--card);border-radius:var(--r-md);border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);}
.bal-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:14px;flex-shrink:0;}
.bal-av.pos{background:var(--green-bg);color:var(--green);}
.bal-av.neg{background:var(--red-bg);color:var(--red);}
.bal-av.zero{background:var(--bg);color:var(--text-3);}
.bal-name{flex:1;font-size:14px;font-weight:500;}
.bal-sub{font-size:11px;color:var(--text-3);margin-top:1px;}
.bal-amt{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:500;}
.bal-amt.pos{color:var(--green);}
.bal-amt.neg{color:var(--red);}
.bal-amt.zero{color:var(--text-3);}

/* ── EMPTY ── */
.empty{text-align:center;padding:36px 20px;color:var(--text-3);}
.empty-icon{font-size:34px;margin-bottom:10px;}
.empty-txt{font-size:14px;line-height:1.9;}

/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text-1);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;letter-spacing:.04em;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MODAL ── */
.modal-wrap{position:fixed;inset:0;background:rgba(60,45,35,.38);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-wrap.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:26px 22px 36px;width:100%;max-width:480px;transform:translateY(40px);transition:transform .25s;}
.modal-wrap.open .modal{transform:translateY(0);}
.modal-ttl{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:500;text-align:center;margin-bottom:7px;}
.modal-desc{font-size:13px;color:var(--text-2);text-align:center;line-height:1.9;margin-bottom:22px;}
.modal-btns{display:flex;gap:10px;}
.mbtn{flex:1;padding:12px;border-radius:var(--r-sm);font-family:'Noto Sans TC',sans-serif;font-size:14px;cursor:pointer;border:1.5px solid var(--border);transition:all .2s;}
.mbtn.cancel{background:var(--bg);color:var(--text-2);}
.mbtn.confirm{background:var(--accent);color:#fff;border-color:var(--accent);}

::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<!-- TABS -->
<div class="app-tabs">
  <div class="app-tab active" id="tab-orders" onclick="switchTab('orders')">
    <span class="ti">🍱</span>訂單
  </div>
  <div class="app-tab" id="tab-settle" onclick="switchTab('settle')">
    <span class="ti">🧾</span>月結
  </div>
  <div class="app-tab" id="tab-add" onclick="switchTab('add')">
    <span class="ti">＋</span>新增
  </div>
</div>

<!-- ══ VIEW: ORDERS ══ -->
<div class="view active" id="view-orders">
  <div class="month-header">
    <div class="mh-top">
      <div class="mh-title">午餐分帳 ☕</div>
      <div class="month-nav">
        <button class="mnav-btn" onclick="shiftMonth(-1)">‹</button>
        <div class="mnav-lbl" id="orders-month-lbl"></div>
        <button class="mnav-btn" onclick="shiftMonth(1)">›</button>
      </div>
    </div>
    <div class="stats-grid">
      <div class="sg-item"><div class="sg-lbl">訂單數</div><div class="sg-val" id="o-count">0</div></div>
      <div class="sg-item"><div class="sg-lbl">總金額</div><div class="sg-val" id="o-total">$0</div></div>
      <div class="sg-item"><div class="sg-lbl">未結清</div><div class="sg-val red" id="o-unpaid">$0</div></div>
    </div>
  </div>
  <div class="sec"><span id="orders-sec-lbl">本月訂單</span></div>
  <div class="order-list" id="order-list"></div>
</div>

<!-- ══ VIEW: SETTLE ══ -->
<div class="view" id="view-settle">

  <div class="settle-hero">
    <div class="sh-top">
      <div>
        <div class="sh-month" id="settle-month-title"></div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px;" id="settle-order-count"></div>
      </div>
      <div class="sh-badge" id="settle-badge">進行中</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-row">
        <span>結清進度</span>
        <span id="settle-progress-txt">0 / 0 筆</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="settle-progress-fill" style="width:0%"></div></div>
    </div>
    <div class="sh-stats">
      <div class="sh-stat"><div class="sh-stat-lbl">應收總額</div><div class="sh-stat-val" id="sh-total">$0</div></div>
      <div class="sh-stat"><div class="sh-stat-lbl">未結清</div><div class="sh-stat-val" style="color:var(--red)" id="sh-unpaid">$0</div></div>
      <div class="sh-stat"><div class="sh-stat-lbl">已結清</div><div class="sh-stat-val" style="color:var(--green)" id="sh-paid">$0</div></div>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;">
    <button class="mnav-btn" onclick="shiftSettleMonth(-1)" style="flex-shrink:0">‹</button>
    <div style="flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--text-1)" id="settle-nav-lbl"></div>
    <button class="mnav-btn" onclick="shiftSettleMonth(1)" style="flex-shrink:0">›</button>
  </div>

  <div class="filter-pills" id="settle-filter-pills">
    <div class="pill active" onclick="setSettleFilter('all',this)">全部</div>
    <div class="pill" onclick="setSettleFilter('unpaid',this)">未付款</div>
    <div class="pill" onclick="setSettleFilter('paid',this)">已付款</div>
  </div>

  <div class="debt-section">
    <div class="sec">最終結算</div>
    <div class="debt-cards" id="debt-cards"></div>
  </div>

  <div class="balance-section">
    <div class="sec">每人淨餘額</div>
    <div class="bal-cards" id="bal-cards"></div>
  </div>

  <div style="margin-top:4px;">
    <button class="btn-ghost" onclick="openArchiveModal()">✦ 封存本月，開始新月份</button>
  </div>
</div>

<!-- ══ VIEW: ADD ══ -->
<div class="view" id="view-add">
  <div class="sec">新增訂單</div>
  <div class="form-card">
    <div class="frow">
      <div class="fg">
        <span class="flbl">訂單名稱</span>
        <input class="finp" id="f-title" placeholder="便當 / 飲料..." autocomplete="off">
      </div>
      <div class="fg">
        <span class="flbl">日期</span>
        <input class="finp" id="f-date" type="date">
      </div>
    </div>

    <div class="payer-wrap">
      <div class="flbl" style="margin-bottom:6px;">付款人</div>
      <div class="payer-row" id="payer-row"></div>
    </div>

    <div class="frow one" style="margin-bottom:10px;">
      <div class="fg">
        <span class="flbl">總金額</span>
        <input class="finp" id="f-amount" type="number" placeholder="0" inputmode="numeric">
      </div>
    </div>

    <div class="part-area">
      <div class="part-lbl">參與者（點選）</div>
      <div class="part-chips" id="part-chips"></div>
      <div class="new-mem-row">
        <input class="new-mem-inp" id="new-mem-inp" placeholder="新增成員..." autocomplete="off">
        <button class="new-mem-btn" onclick="addMember()">＋</button>
      </div>
    </div>

    <div class="flbl" style="margin-bottom:6px;">分帳方式</div>
    <div class="split-row">
      <button class="sp-btn active" id="sp-eq" onclick="setSplit('equal')">均分</button>
      <button class="sp-btn" id="sp-cu" onclick="setSplit('custom')">自訂金額</button>
    </div>

    <div id="ca-area" style="display:none;">
      <div class="ca-wrap" id="ca-wrap"></div>
    </div>

    <button class="btn-main" onclick="addOrder()">＋ 新增訂單</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Archive Modal -->
<div class="modal-wrap" id="archive-modal">
  <div class="modal">
    <div class="modal-ttl">封存本月？</div>
    <div class="modal-desc" id="archive-modal-desc">本月紀錄將封存保留<br>可切換月份查閱歷史</div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">取消</button>
      <button class="mbtn confirm" onclick="archiveMonth()">確認封存</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  STORAGE SCHEMA
//  orders: [{id, title, date, payer, totalAmount, splitMode, splits:[{name,amount,paid}]}]
//  members: [string]
//  monthPayments: { "YYYY-MM": { "A→B": {paid:bool, paidAt:string|null} } }
// ══════════════════════════════════════════

let orders        = JSON.parse(localStorage.getItem('ls3-orders')  || '[]');
let members       = JSON.parse(localStorage.getItem('ls3-members') || '["Sophia","Allen","Gaze","Daby","Juno","Evan","Janice","Amber","Yun","Lillian","Justin","Pierre","Brian"]');
let monthPayments = JSON.parse(localStorage.getItem('ls3-mpay')    || '{}');

// UI state
let viewMonth    = monthKey(new Date());
let settleMonth  = monthKey(new Date());
let settleFilter = 'all';
let selectedPayer   = null;
let selectedMembers = new Set();
let splitMode       = 'equal';
let expandedOrder   = null;

// ── helpers ──
function monthKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(k){ const [y,m]=k.split('-'); return `${y} 年 ${+m} 月`; }
function shiftKey(k,n){ const [y,m]=k.split('-'); const d=new Date(+y,+m-1+n,1); return monthKey(d); }
function isCurrentMonth(k){ return k===monthKey(new Date()); }
function fmtDate(iso){ return iso.slice(5).replace('-','/'); }
function today(){ return new Date().toISOString().split('T')[0]; }

// ── persist ──
function save(){
  localStorage.setItem('ls3-orders',  JSON.stringify(orders));
  localStorage.setItem('ls3-members', JSON.stringify(members));
  localStorage.setItem('ls3-mpay',    JSON.stringify(monthPayments));
}

// ══════════════════════════════════════════
//  DEBT ENGINE
// ══════════════════════════════════════════
function ordersForMonth(mk){
  return orders.filter(o => o.date.slice(0,7) === mk);
}

function calcDebts(mk){
  const raw = {};
  ordersForMonth(mk).forEach(o => {
    o.splits.forEach(s => {
      if(s.name === o.payer) return;
      if(!raw[s.name]) raw[s.name] = {};
      raw[s.name][o.payer] = (raw[s.name][o.payer]||0) + s.amount;
    });
  });
  const result = [];
  const done = new Set();
  Object.keys(raw).forEach(debtor => {
    Object.keys(raw[debtor]).forEach(creditor => {
      const k = [debtor,creditor].sort().join('|');
      if(done.has(k)) return; done.add(k);
      const ab = raw[debtor]?.[creditor] || 0;
      const ba = raw[creditor]?.[debtor] || 0;
      const net = ab - ba;
      if(net > 0.01)       result.push({from:debtor,   to:creditor, amount:+net.toFixed(1)});
      else if(net < -0.01) result.push({from:creditor, to:debtor,   amount:+(-net).toFixed(1)});
    });
  });
  return result.filter(d=>d.amount>0).sort((a,b)=>b.amount-a.amount);
}

function calcNetBalance(mk){
  const bal = {};
  ordersForMonth(mk).forEach(o => {
    o.splits.forEach(s => {
      if(s.name === o.payer) return;
      if(!bal[o.payer]) bal[o.payer]=0;
      if(!bal[s.name])  bal[s.name]=0;
      bal[o.payer] += s.amount;
      bal[s.name]  -= s.amount;
    });
  });
  return bal;
}

function mpGet(mk, key){ return monthPayments[mk]?.[key] || {paid:false, paidAt:null}; }
function mpSet(mk, key, paid){
  if(!monthPayments[mk]) monthPayments[mk]={};
  monthPayments[mk][key] = { paid, paidAt: paid ? today() : null };
  save();
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function init(){
  document.getElementById('f-date').value = today();
  renderPayerRow();
  renderPartChips();
  render();
}

function render(){
  renderOrdersView();
  renderSettleView();
}

// ══════════════════════════════════════════
//  ORDERS VIEW
// ══════════════════════════════════════════
function renderOrdersView(){
  const mk = viewMonth;
  const mo = ordersForMonth(mk);
  const total  = mo.reduce((s,o)=>s+o.totalAmount,0);
  const unpaid = mo.reduce((s,o)=>s+o.splits.filter(x=>!x.paid&&x.name!==o.payer).reduce((a,x)=>a+x.amount,0),0);

  document.getElementById('orders-month-lbl').textContent = monthLabel(mk).replace(' 年 ',' / ').replace(' 月','');
  document.getElementById('orders-sec-lbl').textContent   = `${monthLabel(mk)} 訂單`;
  document.getElementById('o-count').textContent  = mo.length;
  document.getElementById('o-total').textContent  = `$${total.toFixed(0)}`;
  document.getElementById('o-unpaid').textContent = `$${unpaid.toFixed(0)}`;

  const el = document.getElementById('order-list');
  const sorted = [...mo].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🍱</div><div class="empty-txt">${monthLabel(mk)}沒有訂單<br>點「新增」開始記錄吧</div></div>`;
    return;
  }
  el.innerHTML = sorted.map(o=>{
    const unpaidAmt = o.splits.filter(s=>!s.paid&&s.name!==o.payer).reduce((a,s)=>a+s.amount,0);
    const allPaid   = unpaidAmt < 0.01;
    const isOpen    = expandedOrder===o.id;
    const splitsHtml = o.splits.map(s=>{
      const ip = s.name===o.payer;
      return `<div class="oc-split-row">
        <div class="oc-sname">${s.name}${ip?' 💳':''}</div>
        <div class="oc-samt">$${s.amount.toFixed(0)}</div>
        <div class="oc-stag ${ip?'is-payer':s.paid?'paid':'unpaid'}" ${!ip?`onclick="toggleSplit('${o.id}','${s.name}')"`:''}>${ip?'付款人':s.paid?'已付':'未付'}</div>
      </div>`;
    }).join('');
    return `<div class="order-card">
      <div class="oc-head" onclick="toggleOrder('${o.id}')">
        <div class="oc-av">${o.payer.slice(0,1)}</div>
        <div class="oc-info">
          <div class="oc-title">${o.title}</div>
          <div class="oc-meta">${fmtDate(o.date)} · ${o.payer} 代付 · ${o.splits.length} 人</div>
        </div>
        <div class="oc-right">
          <div class="oc-amt">$${o.totalAmount.toFixed(0)}</div>
          <div class="oc-status" style="color:${allPaid?'var(--green)':'var(--red)'}">
            ${allPaid?'已結清':'欠 $'+unpaidAmt.toFixed(0)}
          </div>
        </div>
        <div class="oc-chev ${isOpen?'open':''}">▶</div>
      </div>
      <div class="oc-body ${isOpen?'open':''}">
        <div class="oc-payer-bar">
          <div class="oc-payer-lbl">💳 ${o.payer} 代付 $${o.totalAmount.toFixed(0)} · ${o.splitMode==='equal'?'均分':'自訂'}</div>
          <button class="oc-del" onclick="deleteOrder('${o.id}')">✕</button>
        </div>
        ${splitsHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleOrder(id){ expandedOrder=expandedOrder===id?null:id; renderOrdersView(); }

function toggleSplit(orderId, name){
  const o=orders.find(x=>x.id===orderId); if(!o)return;
  const s=o.splits.find(x=>x.name===name); if(!s)return;
  s.paid=!s.paid; save(); render();
}

function deleteOrder(id){
  orders=orders.filter(o=>o.id!==id); save(); render(); showToast('訂單已刪除');
}

function shiftMonth(n){
  viewMonth=shiftKey(viewMonth,n);
  renderOrdersView();
}

// ══════════════════════════════════════════
//  SETTLE VIEW
// ══════════════════════════════════════════
function renderSettleView(){
  const mk    = settleMonth;
  const debts = calcDebts(mk);
  const bal   = calcNetBalance(mk);
  const mo    = ordersForMonth(mk);

  document.getElementById('settle-month-title').textContent  = monthLabel(mk);
  document.getElementById('settle-nav-lbl').textContent      = monthLabel(mk);
  document.getElementById('settle-order-count').textContent  = `共 ${mo.length} 筆訂單`;
  document.getElementById('settle-badge').textContent        = isCurrentMonth(mk)?'進行中':'已封存';
  document.getElementById('settle-badge').className          = 'sh-badge '+(isCurrentMonth(mk)?'ongoing':'past');

  const totalDebt  = debts.reduce((s,d)=>s+d.amount,0);
  const paidDebt   = debts.filter(d=>mpGet(mk,`${d.from}→${d.to}`).paid).reduce((s,d)=>s+d.amount,0);
  const unpaidDebt = totalDebt - paidDebt;
  document.getElementById('sh-total').textContent  = `$${totalDebt.toFixed(0)}`;
  document.getElementById('sh-unpaid').textContent = `$${unpaidDebt.toFixed(0)}`;
  document.getElementById('sh-paid').textContent   = `$${paidDebt.toFixed(0)}`;

  const paidCount = debts.filter(d=>mpGet(mk,`${d.from}→${d.to}`).paid).length;
  const pct = debts.length>0 ? Math.round(paidCount/debts.length*100) : 0;
  document.getElementById('settle-progress-txt').textContent   = `${paidCount} / ${debts.length} 筆`;
  document.getElementById('settle-progress-fill').style.width  = pct+'%';

  let filtered = debts;
  if(settleFilter==='unpaid') filtered = debts.filter(d=>!mpGet(mk,`${d.from}→${d.to}`).paid);
  if(settleFilter==='paid')   filtered = debts.filter(d=> mpGet(mk,`${d.from}→${d.to}`).paid);

  const dcEl = document.getElementById('debt-cards');
  if(!filtered.length && debts.length===0){
    dcEl.innerHTML=`<div class="empty"><div class="empty-icon">🎉</div><div class="empty-txt">這個月沒有代付紀錄</div></div>`;
  } else if(!filtered.length){
    dcEl.innerHTML=`<div class="empty" style="padding:20px"><div class="empty-txt">${settleFilter==='unpaid'?'🎉 全部已付清！':'沒有已付款紀錄'}</div></div>`;
  } else {
    dcEl.innerHTML = filtered.map(d=>{
      const key = `${d.from}→${d.to}`;
      const st  = mpGet(mk, key);
      return `<div class="debt-card ${st.paid?'is-paid':''}">
        <div class="dc-top">
          <div class="dc-from-av">${d.from.slice(0,1)}</div>
          <div class="dc-arrow-wrap"><div class="dc-arrow">→</div></div>
          <div class="dc-to-av">${d.to.slice(0,1)}</div>
          <div class="dc-info">
            <div class="dc-names">
              <span class="dc-from-name">${d.from}</span>
              <span class="dc-arrow-txt">→ 給</span>
              <span class="dc-to-name">${d.to}</span>
            </div>
            <div class="dc-sub">${st.paid?`✓ 已付款於 ${fmtDate(st.paidAt)}`:'尚未付款'}</div>
          </div>
          <div class="dc-right">
            <div class="dc-amount">$${d.amount.toFixed(0)}</div>
            <div class="dc-paid-btn ${st.paid?'paid':''}" onclick="toggleDebtPaid('${mk}','${key}')">
              <div class="dc-check">${st.paid?'✓':''}</div>
              ${st.paid?'已付款':'標記付款'}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  const balEl    = document.getElementById('bal-cards');
  const balNames = Object.keys(bal).filter(m=>Math.abs(bal[m])>0.01||mo.some(o=>o.splits.some(s=>s.name===m)));
  if(!balNames.length){
    balEl.innerHTML=`<div class="empty" style="padding:16px"><div class="empty-txt">尚無資料</div></div>`;
  } else {
    balEl.innerHTML = balNames.sort((a,b)=>bal[b]-bal[a]).map(m=>{
      const v   = bal[m]||0;
      const cls = v>0.01?'pos':v<-0.01?'neg':'zero';
      const lbl = v>0.01?`待收 $${v.toFixed(0)}`:v<-0.01?`待付 $${Math.abs(v).toFixed(0)}`:'已結清';
      const sgn = v>0.01?'+':v<-0.01?'-':'';
      return `<div class="bal-card">
        <div class="bal-av ${cls}">${m.slice(0,1)}</div>
        <div><div class="bal-name">${m}</div><div class="bal-sub">${lbl}</div></div>
        <div class="bal-amt ${cls}">${sgn}$${Math.abs(v).toFixed(0)}</div>
      </div>`;
    }).join('');
  }
}

function shiftSettleMonth(n){
  settleMonth=shiftKey(settleMonth,n);
  renderSettleView();
}

function setSettleFilter(f, el){
  settleFilter=f;
  document.querySelectorAll('#settle-filter-pills .pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderSettleView();
}

function toggleDebtPaid(mk, key){
  const cur=mpGet(mk,key).paid;
  mpSet(mk, key, !cur);
  renderSettleView();
  showToast(!cur?'已標記付款':'已取消付款');
}

// ══════════════════════════════════════════
//  ADD ORDER FORM
// ══════════════════════════════════════════
function renderPayerRow(){
  document.getElementById('payer-row').innerHTML = members.map(m=>
    `<div class="pc ${selectedPayer===m?'sel':''}" onclick="selectPayer('${m}')">${m}</div>`
  ).join('');
}
function renderPartChips(){
  document.getElementById('part-chips').innerHTML = members.map(m=>
    `<div class="chip ${selectedMembers.has(m)?'sel':''}" onclick="toggleMember('${m}')">
      <div class="chip-dot"></div>${m}
    </div>`
  ).join('');
}
function selectPayer(m){ selectedPayer=selectedPayer===m?null:m; renderPayerRow(); }
function toggleMember(m){
  if(selectedMembers.has(m)) selectedMembers.delete(m); else selectedMembers.add(m);
  renderPartChips(); updateCA();
}
function addMember(){
  const inp=document.getElementById('new-mem-inp');
  const name=inp.value.trim(); if(!name)return;
  if(members.includes(name)){showToast(`${name} 已存在`);return;}
  members.push(name); save(); selectedMembers.add(name); inp.value='';
  renderPayerRow(); renderPartChips(); updateCA();
}
function setSplit(mode){
  splitMode=mode;
  document.getElementById('sp-eq').classList.toggle('active',mode==='equal');
  document.getElementById('sp-cu').classList.toggle('active',mode==='custom');
  document.getElementById('ca-area').style.display=mode==='custom'?'block':'none';
  if(mode==='custom') updateCA();
}
function updateCA(){
  if(splitMode!=='custom') return;
  const mems=[...selectedMembers];
  const total=parseFloat(document.getElementById('f-amount').value)||0;
  const per=mems.length>0?+(total/mems.length).toFixed(0):0;
  document.getElementById('ca-wrap').innerHTML=
    mems.map(m=>`<div class="ca-row">
      <div class="ca-name">${m}</div>
      <input class="ca-inp" id="ca-${m}" type="number" inputmode="numeric" value="${per}" oninput="updateCASum()">
    </div>`).join('')+
    `<div class="ca-foot"><span class="ca-foot-lbl">已分配</span><span class="ca-foot-val" id="ca-sum">$0</span></div>`;
  updateCASum();
}
function updateCASum(){
  const mems=[...selectedMembers];
  const total=parseFloat(document.getElementById('f-amount').value)||0;
  const sum=mems.reduce((s,m)=>s+(parseFloat(document.getElementById(`ca-${m}`)?.value)||0),0);
  const el=document.getElementById('ca-sum'); if(!el)return;
  el.textContent=`$${sum.toFixed(0)} / $${total.toFixed(0)}`;
  el.className='ca-foot-val '+(Math.abs(sum-total)<1?'ok':'ng');
}

function addOrder(){
  const title  = document.getElementById('f-title').value.trim()||'午餐';
  const date   = document.getElementById('f-date').value;
  const total  = parseFloat(document.getElementById('f-amount').value);
  const mems   = [...selectedMembers];
  if(!selectedPayer)          { showToast('請選擇付款人'); return; }
  if(!total||total<=0)        { showToast('請輸入金額');   return; }
  if(!mems.length)            { showToast('請選擇參與者'); return; }
  if(!date)                   { showToast('請選擇日期');   return; }

  let splits=[];
  if(splitMode==='equal'){
    const share=+(total/mems.length).toFixed(1);
    splits=mems.map(m=>({name:m,amount:share,paid:m===selectedPayer}));
  } else {
    splits=mems.map(m=>{
      const v=parseFloat(document.getElementById(`ca-${m}`)?.value)||0;
      return {name:m,amount:v,paid:m===selectedPayer};
    });
    const sum=splits.reduce((s,x)=>s+x.amount,0);
    if(Math.abs(sum-total)>1){showToast(`金額加總 $${sum.toFixed(0)} 與總額 $${total} 不符`);return;}
  }

  orders.push({id:Date.now().toString(),title,date,payer:selectedPayer,totalAmount:total,splitMode,splits});
  save(); render();
  showToast(`已新增「${title}」$${total}`);

  document.getElementById('f-title').value='';
  document.getElementById('f-amount').value='';
  selectedMembers.clear(); selectedPayer=null; splitMode='equal';
  document.getElementById('sp-eq').classList.add('active');
  document.getElementById('sp-cu').classList.remove('active');
  document.getElementById('ca-area').style.display='none';
  renderPayerRow(); renderPartChips();

  viewMonth=date.slice(0,7);
  switchTab('orders');
}

// ══════════════════════════════════════════
//  ARCHIVE
// ══════════════════════════════════════════
function openArchiveModal(){
  document.getElementById('archive-modal-desc').innerHTML=
    `${monthLabel(settleMonth)}的紀錄將封存保留<br>可切換月份查閱歷史`;
  document.getElementById('archive-modal').classList.add('open');
}
function closeModal(){ document.querySelectorAll('.modal-wrap').forEach(m=>m.classList.remove('open')); }
function archiveMonth(){
  settleMonth=shiftKey(settleMonth,1);
  viewMonth=settleMonth;
  closeModal(); render();
  showToast(`已封存，切換至 ${monthLabel(settleMonth)}`);
}

// ══════════════════════════════════════════
//  TAB / UTILS
// ══════════════════════════════════════════
function switchTab(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.app-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='settle') renderSettleView();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

document.querySelectorAll('.modal-wrap').forEach(mw=>{
  mw.addEventListener('click',e=>{ if(e.target===mw) closeModal(); });
});
document.getElementById('f-amount').addEventListener('input', updateCA);
document.getElementById('new-mem-inp').addEventListener('keydown',e=>{ if(e.key==='Enter') addMember(); });

init();
</script>
</body>
